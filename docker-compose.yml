services:
  mongodb:
    image: mongo:7
    container_name: teams-todo-bot-mongodb
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb-init-replica:
    image: mongo:7
    container_name: teams-todo-bot-mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint:
      [
        "bash",
        "-lc",
        "mongosh \"mongodb://mongodb:27017\" --eval \"try { rs.status() } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) }\"",
      ]

  redis:
    image: redis:7-alpine
    container_name: teams-todo-bot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
